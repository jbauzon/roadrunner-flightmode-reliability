appId: com.anduril.roadrunner-flight-test
productName: Roadrunner Flight Test
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  deleteAppDataOnUninstall: false
extraResources:
  - from: ../vehicle
    to: backend/vehicle
    filter:
      - "**/*"
  - from: ../testing
    to: backend/testing
    filter:
      - "**/*"
  - from: ../hardware
    to: backend/hardware
    filter:
      - "**/*"
  - from: ../sim
    to: backend/sim
    filter:
      - "**/*"
  - from: ../ws_server.py
    to: backend/ws_server.py
  - from: ../vehicle/dialects
    to: backend/vehicle/dialects
    filter:
      - "**/*"
